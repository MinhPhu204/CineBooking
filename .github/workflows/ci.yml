name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run Backend Tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_TEST_URI: mongodb://localhost:27017/cinema_test
          JWT_SECRET: super_secret_test_key_here
          JWT_REFRESH_SECRET: super_secret_refresh_key_here
          JWT_EXPIRE: 15m
          JWT_REFRESH_EXPIRE: 7d
          PAYOS_CLIENT_ID: dummy_client_id
          PAYOS_API_KEY: dummy_api_key
          PAYOS_CHECKSUM_KEY: dummy_checksum_key

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5001/api
          CI: false
